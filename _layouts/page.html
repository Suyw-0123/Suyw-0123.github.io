---
layout: default
---
<article class="max-w-4xl mx-auto px-6 py-12">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold theme-heading mb-4">{{ page.title }}</h1>
        {% if page.date %}
        <p class="theme-muted">{{ page.date | date: "%B %d, %Y" }}</p>
        {% endif %}
        {% if page.tags %}
        <div class="flex flex-wrap justify-center gap-2 mt-4">
            {% for tag in page.tags %}
            <span class="text-[10px] uppercase tracking-wider theme-pill px-2 py-1 rounded">{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="theme-prose prose dark:prose-invert max-w-none">
        {{ content }}
    </div>

    <div class="mt-20 border-t theme-border pt-8">
        <a href="/" class="theme-link">&larr; Back to Home</a>
    </div>
</article>
